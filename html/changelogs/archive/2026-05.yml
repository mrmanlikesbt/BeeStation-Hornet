  - tweak: For Psyphoza soul colour, rather than 3 colours (Azure / Vermilion / Sage)
      are initialised first, 10 colours will be chosen. It doesn't mean low pop will
      have 10 colours presented at a round. This just lets you to see more colours
      tweaks rather than lame 3 colours.
